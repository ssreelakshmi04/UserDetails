name: CI — UserDetails

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    name: Lint & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt && pip install gunicorn pytest flake8

      - name: Lint with flake8
        run: |
          # stop the build if there are Python syntax errors or undefined names
          flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
        continue-on-error: true

      - name: Run tests (if any)
        run: |
          if [ -f pytest.ini ] || ls test_*.py 1> /dev/null 2>&1; then
            pytest --tb=short
          else
            echo "No tests found — skipping"
          fi

  docker:
    name: Docker Build Check
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          load: true
          tags: userdetails:latest

      - name: Verify container starts
        run: |
          # We pass -e PORT=5000 so the Dockerfile's CMD has a port to bind to
          docker run -d --name test-container -e PORT=5000 -p 5000:5000 userdetails:latest
          sleep 10
          docker ps | grep test-container
          # Check logs if it failed
          docker logs test-container
          docker stop test-container
